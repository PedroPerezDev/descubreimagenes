<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Desvela la imagen!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA 1: Carga -->
  <section id="upload-screen">
    <div class="deco deco-1">⭐</div>
    <div class="deco deco-2">🌈</div>
    <div class="deco deco-3">🎉</div>
    <div class="deco deco-4">✨</div>

    <div class="upload-card">
      <div class="logo">
        <span class="logo-icon">🖼️</span>
        <h1>¡Desvela<br>la imagen!</h1>
      </div>
      <p class="subtitle">Sube una foto y descúbrela cuadrito a cuadrito</p>

      <div id="drop-zone" role="button" tabindex="0" aria-label="Zona de arrastre de imagen">
        <div class="drop-icon">📂</div>
        <p class="drop-text">Arrastra una imagen aquí</p>
        <span class="drop-or">— o —</span>
        <label for="file-input" class="btn btn-secondary">🔍 Elige un archivo</label>
        <input type="file" id="file-input" accept="image/*" aria-label="Seleccionar imagen">
        <p id="file-name" class="file-name" aria-live="polite"></p>
      </div>

      <div class="slider-group">
        <label for="tile-slider">
          Número de cuadritos: <strong id="tile-count-label">20</strong>
        </label>
        <input type="range" id="tile-slider" min="4" max="100" value="20" step="1">
        <div class="slider-marks">
          <span>4</span>
          <span>100</span>
        </div>
      </div>

      <button id="start-btn" class="btn btn-primary" disabled>🚀 ¡Empezar!</button>
    </div>
  </section>

  <!-- PANTALLA 2: Juego -->
  <section id="game-screen" hidden>
    <header class="game-header">
      <span class="header-title">🖼️ ¡Desvela la imagen!</span>
      <div class="progress-info">
        <span id="progress-label">0 / 0</span>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill"></div>
        </div>
      </div>
      <button id="new-game-btn" class="btn btn-secondary btn-sm">🔄 Nueva imagen</button>
    </header>

    <main class="game-main">
      <div id="image-container">
        <img id="game-image" src="" alt="Imagen del juego">
        <div id="tile-grid" aria-label="Rejilla de fichas"></div>
      </div>
    </main>

    <!-- Overlay de victoria -->
    <div id="victory-overlay" hidden aria-live="assertive">
      <div class="confetti-container" id="confetti-container"></div>
      <div class="victory-card">
        <div class="victory-emoji">🎊</div>
        <h2>¡Lo conseguiste!</h2>
        <p>¡Has destapado todos los cuadritos!</p>
        <div class="victory-buttons">
          <button id="replay-btn" class="btn btn-primary">🔁 Otra vez</button>
          <button id="victory-new-btn" class="btn btn-secondary">🖼️ Nueva imagen</button>
        </div>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
