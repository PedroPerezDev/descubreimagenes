<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reveal the Picture!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN 1: Upload -->
  <section id="upload-screen">
    <div class="deco deco-1">⭐</div>
    <div class="deco deco-2">🌈</div>
    <div class="deco deco-3">🎉</div>
    <div class="deco deco-4">✨</div>

    <div class="upload-card">
      <div class="logo">
        <span class="logo-icon">🖼️</span>
        <h1>Reveal the<br>Picture!</h1>
      </div>
      <p class="subtitle">Upload a photo and uncover it tile by tile!</p>

      <div id="drop-zone" role="button" tabindex="0" aria-label="Image drop zone">
        <div class="drop-icon">📂</div>
        <p class="drop-text">Drag an image here</p>
        <span class="drop-or">— or —</span>
        <label for="file-input" class="btn btn-secondary">🔍 Choose a file</label>
        <input type="file" id="file-input" accept="image/*" aria-label="Select image">
        <p id="file-name" class="file-name" aria-live="polite"></p>
      </div>

      <div class="slider-group">
        <label for="tile-slider">
          Number of tiles: <strong id="tile-count-label">20</strong>
        </label>
        <input type="range" id="tile-slider" min="4" max="100" value="20" step="1">
        <div class="slider-marks">
          <span>4</span>
          <span>100</span>
        </div>
      </div>

      <button id="start-btn" class="btn btn-primary" disabled>🚀 Let's go!</button>
    </div>
  </section>

  <!-- SCREEN 2: Game -->
  <section id="game-screen" hidden>
    <header class="game-header">
      <span class="header-title">🖼️ Reveal the Picture!</span>
      <div class="progress-info">
        <span id="progress-label">0 / 0</span>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill"></div>
        </div>
      </div>
      <div class="header-buttons">
        <button id="reveal-all-btn" class="btn btn-reveal btn-sm">👁️ Reveal all</button>
        <button id="new-game-btn" class="btn btn-secondary btn-sm">🔄 New image</button>
      </div>
    </header>

    <main class="game-main">
      <div id="image-container">
        <img id="game-image" src="" alt="Game image">
        <div id="tile-grid" aria-label="Tile grid"></div>
      </div>
    </main>

  </section>

  <script src="main.js"></script>
</body>
</html>
