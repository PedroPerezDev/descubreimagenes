<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desvela la imagen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA 1: Carga de imagen -->
  <section id="upload-screen">
    <div class="upload-card">
      <h1>Desvela la imagen</h1>
      <p class="subtitle">Carga una imagen y descúbrela ficha a ficha</p>

      <div id="drop-zone" role="button" tabindex="0" aria-label="Zona de arrastre de imagen">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M3 15v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Arrastra una imagen aquí</p>
        <span>o</span>
        <label for="file-input" class="btn btn-secondary">Elige un archivo</label>
        <input type="file" id="file-input" accept="image/*" aria-label="Seleccionar imagen">
        <p id="file-name" class="file-name" aria-live="polite"></p>
      </div>

      <div class="slider-group">
        <label for="tile-slider">
          Número de fichas: <strong id="tile-count-label">20</strong>
        </label>
        <input type="range" id="tile-slider" min="4" max="100" value="20" step="1">
        <div class="slider-marks">
          <span>4</span>
          <span>100</span>
        </div>
      </div>

      <button id="start-btn" class="btn btn-primary" disabled>Empezar</button>
    </div>
  </section>

  <!-- PANTALLA 2: Juego -->
  <section id="game-screen" hidden>
    <header class="game-header">
      <div class="progress-info">
        <span id="progress-label">0 / 0 fichas retiradas</span>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill"></div>
        </div>
      </div>
      <button id="new-game-btn" class="btn btn-secondary">Nueva partida</button>
    </header>

    <main class="game-main">
      <div id="image-container">
        <img id="game-image" src="" alt="Imagen del juego">
        <div id="tile-grid" aria-label="Rejilla de fichas"></div>
      </div>
    </main>

    <!-- Overlay de victoria -->
    <div id="victory-overlay" hidden aria-live="assertive">
      <div class="victory-card">
        <div class="victory-icon">🎉</div>
        <h2>¡Imagen revelada!</h2>
        <p>Has destapado todas las fichas</p>
        <div class="victory-buttons">
          <button id="replay-btn" class="btn btn-primary">Jugar de nuevo</button>
          <button id="victory-new-btn" class="btn btn-secondary">Nueva imagen</button>
        </div>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
